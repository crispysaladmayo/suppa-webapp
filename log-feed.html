<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catat minum — Suppa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <a class="btn btn--ghost" href="today-infant.html" style="margin: -0.5rem 0 1rem; align-self: flex-start">Kembali</a>
      <h1 class="title">Catat minum</h1>
      <p class="body-muted">Untuk bayi di bawah 6 bulan—hanya ASI atau susu formula di M1 (tanpa kelompok makanan padat).</p>

      <main style="margin-top: 1.25rem">
        <fieldset class="field" style="border: none; padding: 0; margin: 0">
          <legend class="field" style="margin-bottom: 0.5rem; font-weight: 600">Pola hari ini</legend>
          <label class="check-row" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem">
            <input type="radio" name="feed" value="breast" checked />
            Sebagian besar ASI
          </label>
          <label class="check-row" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem">
            <input type="radio" name="feed" value="formula" />
            Sebagian besar susu formula
          </label>
          <label class="check-row" style="display: flex; align-items: center; gap: 0.5rem">
            <input type="radio" name="feed" value="mixed" />
            Campuran / kombinasi
          </label>
        </fieldset>

        <button type="button" class="btn btn--primary" style="margin-top: 1.5rem; width: 100%" id="save-feed">
          Simpan
        </button>
      </main>
    </div>
    <script>
      (function () {
        document.getElementById("save-feed").addEventListener("click", function () {
          window.location.href = "today-infant.html";
        });
      })();
    </script>
    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset kata sandi — Suppa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <a class="btn btn--ghost" href="auth.html?mode=login" style="margin: -0.5rem 0 1rem; align-self: flex-start"
        >Kembali</a
      >
      <main>
        <a href="index.html" class="brand-lockup brand-lockup--auth" lang="id">
          <img
            class="brand-lockup__mark"
            src="assets/suppa-logo.svg"
            alt=""
            width="38"
            height="38"
            aria-hidden="true"
          />
          <span class="brand-lockup__name">Suppa</span>
        </a>
        <h1 class="title">Reset kata sandi</h1>
        <p class="body-muted">Pilih kata sandi baru (minimal 8 karakter).</p>
        <form class="auth-form" action="auth.html?mode=login" style="margin-top: 1.5rem" id="reset-form">
          <div class="field">
            <label for="password">Kata sandi baru</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
            />
            <p class="body-muted" style="margin-top: 0.35rem; font-size: 0.875rem">Minimal 8 karakter</p>
          </div>
          <div class="field">
            <label for="password2">Konfirmasi kata sandi baru</label>
            <input
              id="password2"
              name="password2"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
            />
          </div>
          <p class="field__error" id="reset-match-error" hidden>Kata sandi tidak cocok.</p>
          <button type="submit" class="btn btn--primary">Simpan kata sandi</button>
        </form>
      </main>
    </div>
    <script>
      (function () {
        var form = document.getElementById("reset-form");
        var p1 = document.getElementById("password");
        var p2 = document.getElementById("password2");
        var err = document.getElementById("reset-match-error");
        if (form) {
          form.addEventListener("submit", function (e) {
            if (!p1 || !p2) return;
            if (p1.value !== p2.value) {
              e.preventDefault();
              if (err) err.hidden = false;
              return;
            }
            if (err) err.hidden = true;
          });
        }
      })();
    </script>
    <script src="app.js"></script>
  </body>
</html>

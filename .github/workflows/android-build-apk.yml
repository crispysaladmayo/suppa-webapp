name: Catholic Daily App — build debug APK

on:
  workflow_dispatch:
  push:
    paths:
      - "Catholic Daily App/android/**"
      - ".github/workflows/android-build-apk.yml"
  pull_request:
    paths:
      - "Catholic Daily App/android/**"

jobs:
  apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Spaces in "Catholic Daily App" can break Android/Gradle paths on Linux CI; build via symlink.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-35

      - name: Link Android project to a path without spaces
        run: |
          set -eux
          SRC="${GITHUB_WORKSPACE}/Catholic Daily App/android"
          test -d "$SRC"
          ln -sfn "$SRC" "${GITHUB_WORKSPACE}/android-ci"

      - name: Set up Gradle (cache + wrapper validation)
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        working-directory: android-ci
        run: chmod +x gradlew

      - name: Assemble debug APK
        working-directory: android-ci
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME:-unset}"
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: catholic-daily-app-debug
          path: Catholic Daily App/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

# Deploy Catholic Daily static webapp to GitHub Pages.
#
# One-time (required before the first deploy succeeds):
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   (Do not use "Deploy from a branch" for this workflow.)
#
# Note: We intentionally omit actions/configure-pages. That action calls GET /repos/.../pages
# and returns 404 until Pages has been enabled in the UI; it is not required for
# upload-pages-artifact + deploy-pages.
name: Deploy Catholic Daily webapp

on:
  push:
    branches: [main]
    paths:
      - "Catholic Daily App/webapp/**"
      - ".github/workflows/catholic-daily-webapp-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-catholic-daily-webapp
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "Catholic Daily App/webapp"
      - id: deployment
        uses: actions/deploy-pages@v4

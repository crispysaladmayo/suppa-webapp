# Publishes the static M1 HTML prototype to GitHub Pages (site root).
# Repo settings → Pages → Build: GitHub Actions (not "Deploy from branch").
name: Deploy M1 prototype to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Child Nutrition App/m1-hifi-prototype
      - id: deployment
        uses: actions/deploy-pages@v4

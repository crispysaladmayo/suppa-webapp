name: Catholic Daily App — content pipeline

on:
  push:
    paths:
      - "Catholic Daily App/pipeline/**"
  pull_request:
    paths:
      - "Catholic Daily App/pipeline/**"

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sample JSON
        run: python3 "Catholic Daily App/pipeline/scripts/validate_content_assets.py"

      - name: Build sample readings SQLite bundle
        run: |
          python3 "Catholic Daily App/pipeline/scripts/build_readings_bundle.py" \
            -i "Catholic Daily App/pipeline/samples/readings-import.sample.json" \
            -o "Catholic Daily App/pipeline/out/readings-ci.db"

      - name: Sanity-check SQLite
        run: sqlite3 "Catholic Daily App/pipeline/out/readings-ci.db" "SELECT COUNT(*) FROM reading_block;"

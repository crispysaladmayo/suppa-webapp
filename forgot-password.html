<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lupa kata sandi — Suppa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <a class="btn btn--ghost" href="auth.html?mode=login" style="margin: -0.5rem 0 1rem; align-self: flex-start"
        >Kembali</a
      >
      <main id="forgot-step-form">
        <a href="index.html" class="brand-lockup brand-lockup--auth" lang="id">
          <img
            class="brand-lockup__mark"
            src="assets/suppa-logo.svg"
            alt=""
            width="38"
            height="38"
            aria-hidden="true"
          />
          <span class="brand-lockup__name">Suppa</span>
        </a>
        <h1 class="title">Lupa kata sandi</h1>
        <p class="body-muted">Kami akan mengirim tautan reset ke email Anda.</p>
        <form class="auth-form" style="margin-top: 1.5rem" id="forgot-form">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <button type="submit" class="btn btn--primary">Kirim tautan reset</button>
        </form>
      </main>
      <main id="forgot-step-sent" hidden>
        <a href="index.html" class="brand-lockup brand-lockup--auth" lang="id">
          <img
            class="brand-lockup__mark"
            src="assets/suppa-logo.svg"
            alt=""
            width="38"
            height="38"
            aria-hidden="true"
          />
          <span class="brand-lockup__name">Suppa</span>
        </a>
        <h1 class="title">Periksa email Anda</h1>
        <p class="body-muted">
          Jika email itu terdaftar di Suppa, kami mengirim tautan reset. Tautan membuka halaman untuk memilih kata sandi
          baru.
        </p>
        <p class="body-muted" style="margin-top: 1rem">
          <a href="reset-password.html?token=demo">Buka halaman reset (tautan demo)</a>
        </p>
        <p style="margin-top: 1.5rem">
          <a class="btn btn--ghost" href="auth.html?mode=login">Kembali ke masuk</a>
        </p>
      </main>
    </div>
    <script>
      (function () {
        var form = document.getElementById("forgot-form");
        var stepForm = document.getElementById("forgot-step-form");
        var stepSent = document.getElementById("forgot-step-sent");
        if (form && stepForm && stepSent) {
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            stepForm.hidden = true;
            stepSent.hidden = false;
          });
        }
      })();
    </script>
    <script src="app.js"></script>
  </body>
</html>

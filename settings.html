<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pengaturan — Suppa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <a class="btn btn--ghost" href="today.html" style="margin: -0.5rem 0 1rem; width: auto">Kembali</a>
      <h1 class="title">Pengaturan</h1>
      <main>
        <nav class="list-group" aria-label="Bagian pengaturan">
          <a href="#"
            >Rumah tangga <span class="list-group__chev" aria-hidden="true">›</span><span class="caption" style="display: block; font-weight: 400">Jakarta · Indonesia</span></a
          >
          <a href="#"
            >Profil anak <span class="list-group__chev" aria-hidden="true">›</span><span class="caption" style="display: block; font-weight: 400">Maya · 3–5 · Telur</span></a
          >
          <a href="growth.html">Pertumbuhan <span class="list-group__chev" aria-hidden="true">›</span></a>
          <a href="#">Akun <span class="list-group__chev" aria-hidden="true">›</span></a>
          <a href="#">Tentang &amp; penyangkalan <span class="list-group__chev" aria-hidden="true">›</span></a>
        </nav>

        <section class="card" aria-labelledby="mindful-heading" style="margin-top: 1.25rem">
          <h2 id="mindful-heading" class="title" style="font-size: 1.05rem">Panduan makan bijak</h2>
          <p class="body-muted" style="font-size: 0.875rem; margin-top: 0.25rem">
            Nilai default untuk usia anak Anda. Sesuaikan jika dokter anak menyarankan target lain—bukan saran medis.
          </p>
          <div class="field" style="margin-top: 1rem">
            <label for="sodium-mg">Panduan natrium (mg/hari)</label>
            <input id="sodium-mg" type="number" inputmode="numeric" value="1500" min="0" step="50" />
          </div>
          <div class="field">
            <label for="sugar-g">Panduan gula tambahan (g/hari)</label>
            <input id="sugar-g" type="number" inputmode="decimal" value="25" min="0" step="1" />
          </div>
          <button type="button" class="btn btn--ghost" id="mindful-reset" style="margin-top: 0.5rem">
            Kembalikan ke default
          </button>
        </section>

        <button type="button" class="btn btn--destructive" style="margin-top: 1.25rem">Keluar</button>
      </main>
    </div>
    <nav class="bottom-nav" aria-label="Navigasi utama">
      <a href="today.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /></svg>
        Hari ini
      </a>
      <a href="log-week.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" /><path d="M12 8v8M8 12h8" /></svg>
        Catat
      </a>
      <a href="fridge.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" /><path d="M5 8h14" /></svg>
        Kulkas
      </a>
      <a href="recipes.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h5v18H6zM13 3h5v18h-5z" /></svg>
        Resep
      </a>
      <a href="meal-prep.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2" /><path d="M3 11h18M8 3v4M16 3v4" /></svg>
        Persiapan
      </a>
    </nav>
    <script>
      (function () {
        var na = document.getElementById("sodium-mg");
        var su = document.getElementById("sugar-g");
        var defNa = "1500";
        var defSu = "25";
        var btn = document.getElementById("mindful-reset");
        if (btn && na && su) {
          btn.addEventListener("click", function () {
            na.value = defNa;
            su.value = defSu;
          });
        }
      })();
    </script>
    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buat akun — Suppa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <a class="btn btn--ghost" href="index.html" style="margin: -0.5rem 0 1rem; align-self: flex-start"
        >Kembali</a
      >
      <main>
        <a href="index.html" class="brand-lockup brand-lockup--auth" lang="id">
          <img
            class="brand-lockup__mark"
            src="assets/suppa-logo.svg"
            alt=""
            width="38"
            height="38"
            aria-hidden="true"
          />
          <span class="brand-lockup__name">Suppa</span>
        </a>
        <h1 class="title" id="auth-title">Buat akun</h1>
        <p class="body-muted">
          Kami memakai profil Anda hanya untuk mempersonalisasi ide makanan.
        </p>
        <form class="auth-form" action="onboarding.html" style="margin-top: 1.5rem">
          <div class="field">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="field">
            <label for="password">Kata sandi</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
            />
            <p class="body-muted" id="password-hint" style="margin-top: 0.35rem; font-size: 0.875rem">
              Minimal 8 karakter
            </p>
            <p class="body-muted" id="forgot-password" style="margin-top: 0.35rem; font-size: 0.875rem" hidden>
              <a href="forgot-password.html">Lupa kata sandi?</a>
            </p>
          </div>
          <p class="field__error" id="auth-inline-error" hidden>
            Email ini sudah terdaftar. <a href="auth.html?mode=login">Masuk</a> saja.
          </p>
          <button type="submit" class="btn btn--primary">Lanjutkan</button>
        </form>
        <p style="margin-top: 1rem; text-align: center; font-size: 0.875rem">
          <a href="#" id="switch-mode">Sudah punya akun? Masuk</a>
        </p>
      </main>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var mode = params.get("mode") || "signup";
        var title = document.getElementById("auth-title");
        var switchEl = document.getElementById("switch-mode");
        var pass = document.getElementById("password");
        var forgot = document.getElementById("forgot-password");
        var hint = document.getElementById("password-hint");
        if (mode === "login") {
          title.textContent = "Selamat datang kembali";
          document.title = "Selamat datang kembali — Suppa";
          pass.setAttribute("autocomplete", "current-password");
          pass.removeAttribute("minlength");
          if (forgot) forgot.hidden = false;
          if (hint) hint.hidden = true;
          switchEl.textContent = "Belum punya akun? Daftar";
          switchEl.href = "auth.html?mode=signup";
        } else {
          document.title = "Buat akun — Suppa";
          pass.setAttribute("minlength", "8");
          if (forgot) forgot.hidden = true;
          if (hint) hint.hidden = false;
          switchEl.textContent = "Sudah punya akun? Masuk";
          switchEl.href = "auth.html?mode=login";
        }
      })();
    </script>
    <script src="app.js"></script>
  </body>
</html>

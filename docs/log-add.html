<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log a meal — Suppa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <header>
        <a class="btn btn--ghost" href="today.html" style="margin: -0.5rem 0 1rem; width: auto">Back</a>
        <h1 class="title">Log a meal</h1>
      </header>
      <main>
        <div class="field">
          <label for="meal-name">Meal name</label>
          <input id="meal-name" type="text" placeholder="Breakfast, Snack…" />
        </div>
        <p class="overline">Type</p>
        <div class="segmented" role="group" aria-label="Meal type">
          <label><input type="radio" name="mtype" checked /><span>Meal</span></label>
          <label><input type="radio" name="mtype" /><span>Snack</span></label>
        </div>
        <p class="overline" style="margin-top: 1.25rem">Food groups</p>
        <p class="caption">Pick at least one. We use these to estimate today’s macros. “Other” does not add to the estimate.</p>
        <div class="chip-grid" role="group" aria-label="Food groups">
          <button type="button" class="chip" data-chip-toggle data-food-group aria-pressed="false">
            Vegetables
          </button>
          <button type="button" class="chip" data-chip-toggle data-food-group aria-pressed="false">
            Fruits
          </button>
          <button type="button" class="chip" data-chip-toggle data-food-group aria-pressed="true">Grains</button>
          <button type="button" class="chip" data-chip-toggle data-food-group aria-pressed="false">
            Protein
          </button>
          <button type="button" class="chip" data-chip-toggle data-food-group aria-pressed="false">
            Dairy / fortified soy
          </button>
          <button type="button" class="chip" data-chip-toggle aria-pressed="false">Other</button>
        </div>
        <p class="field__error" id="food-group-error" hidden>Choose at least one food group for this meal.</p>
        <p class="overline" style="margin-top: 1rem">Portion</p>
        <p class="caption">Adjusts your day’s estimate. Defaults to medium if you don’t change it.</p>
        <div class="segmented" role="radiogroup" aria-label="Portion">
          <label><input type="radio" name="portion" /><span>Small</span></label>
          <label><input type="radio" name="portion" checked /><span>Medium</span></label>
          <label><input type="radio" name="portion" /><span>Large</span></label>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn--primary" data-save-meal>Save</button>
        </div>
      </main>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <nav class="bottom-nav" aria-label="Main navigation">
      <a href="today.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /></svg>
        Today
      </a>
      <a href="log-week.html" aria-current="page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" /><path d="M12 8v8M8 12h8" /></svg>
        Log
      </a>
      <a href="fridge.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2" /><path d="M5 8h14" /></svg>
        Fridge
      </a>
      <a href="recipes.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h5v18H6zM13 3h5v18h-5z" /></svg>
        Recipes
      </a>
    </nav>
    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

  <body>
    <div class="app-frame">
      <header class="top-bar">
        <h1 class="title" style="margin: 0">This week</h1>

      <main>
        <section class="log-day">
          <h2 class="log-day__label">Today</h2>
          <div class="log-row">
            <strong>Oatmeal &amp; banana</strong>
            <p class="log-row__meta">8:10 · Meal</p>
            <div class="mini-dots" aria-hidden="true">
              <span></span><span class="on"></span><span class="on"></span><span></span><span></span>

          </div>
          <div class="log-row">
            <strong>Chicken rice bowl</strong>

        </section>
        <section class="log-day">
          <h2 class="log-day__label">Yesterday</h2>
          <div class="log-row">
            <strong>Cheese sandwich</strong>
            <p class="log-row__meta">Snack</p>
            <div class="mini-dots" aria-hidden="true">
              <span></span><span></span><span class="on"></span><span class="on"></span><span class="on"></span>
            </div>
          </div>
        </section>
        <section class="log-day">
          <h2 class="log-day__label">Friday Apr 4</h2>
          <div class="log-row">
            <strong>Miso soup &amp; tofu</strong>
            <p class="log-row__meta">Dinner</p>
            <div class="mini-dots" aria-hidden="true">
              <span class="on"></span><span></span><span></span><span class="on"></span><span></span>

          </div>
        </section>
      </main>
      <a href="log-add.html" class="fab" aria-label="Log a meal">+</a>
    </div>
    <nav class="bottom-nav" aria-label="Main navigation">

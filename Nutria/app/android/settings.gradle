pluginManagement {
  // NODE path must live here: Gradle 8 requires pluginManagement {} to be first in this file.
  // Android Studio often omits Homebrew/nvm from PATH — see gradle.properties NODE_BINARY.
  def nodeExecutable = {
    def props = new java.util.Properties()
    def gf = new File(rootDir, "gradle.properties")
    if (gf.exists()) {
      gf.withInputStream { props.load(it) }
    }
    def fromFile = props.getProperty("NODE_BINARY")
    if (fromFile != null && !fromFile.trim().isEmpty()) return fromFile.trim()
    def fromEnv = System.getenv("NODE_BINARY")
    if (fromEnv != null && !fromEnv.trim().isEmpty()) return fromEnv.trim()
    for (def candidate : ["/opt/homebrew/bin/node", "/usr/local/bin/node"]) {
      if (new File(candidate).exists()) return candidate
    }
    return "node"
  }()
  System.setProperty("NODE_BINARY", nodeExecutable)

  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(nodeExecutable, "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)

  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(nodeExecutable, "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
  id 'org.gradle.toolchains.foojay-resolver-convention' version '0.10.0'
}

// Must follow `plugins {}` — Gradle 8 allows no other statements between pluginManagement and plugins.
def autolinkingImplementationPath = new File(
  providers.exec {
    workingDir(rootDir)
    def nodeExecutable = System.getProperty("NODE_BINARY") ?: "node"
    commandLine(nodeExecutable, "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
  }.standardOutput.asText.get().trim(),
  "../scripts/android/autolinking_implementation.gradle"
)
apply from: autolinkingImplementationPath

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'Nutria'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)

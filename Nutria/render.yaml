# Render Blueprint: free-tier Postgres + Nutria API (Dockerfile in nutria-web-platform/)
# New → Blueprint → connect this repo. See START_HERE.md for $0 limits & Neon option.
# https://dashboard.render.com

databases:
  - name: nutria-pg
    databaseName: nutria
    user: nutria
    plan: free

services:
  - type: web
    name: nutria-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./nutria-web-platform/Dockerfile
    dockerContext: ./nutria-web-platform
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nutria-pg
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://crispysaladmayo.github.io,http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174
      - key: SESSION_SAMESITE
        value: None
